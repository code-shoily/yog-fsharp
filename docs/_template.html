<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <title>{{fsdocs-page-title}} | Yog.FSharp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="{{root}}content/fsdocs-default.css" />
    <link rel="stylesheet" type="text/css" href="{{root}}content/fsdocs-custom.css" />
    <script src="{{root}}content/fsdocs-tips.js" type="text/javascript"></script>
    <style>
        header .end a {
            display: flex !important;
            margin-left: 20px;
            font-size: var(--font-100);
            text-decoration: none;
            color: var(--text-color);
        }

        header .end a:hover {
            color: var(--primary);
        }

        .start strong {
            font-size: 1.4rem !important;
            color: var(--primary);
        }

        /* Ensures Markdown lists and italics render correctly if the CSS reset was too aggressive */
        #content em {
            font-style: italic;
        }

        #content ul {
            list-style-type: disc;
            margin-bottom: 1rem;
        }

        #fsdocs-page-menu:not(:has(li)) {
            display: none;
        }
    </style>
</head>

<body class="{{fsdocs-list-of-entities-header}}">
    <header>
        <div class="start">
            <a href="{{root}}index.html" style="text-decoration: none;">
                <strong>Yog.FSharp</strong>
            </a>
        </div>
        <div class="end">
            <a href="{{root}}tutorials/getting-started.html">Getting Started</a>
            <a href="{{root}}examples.html">Examples</a>
            <a href="{{root}}reference/index.html">API Reference</a>
            <a href="https://github.com/code-shoily/yog-fsharp" target="_blank">GitHub</a>
            <div class="search">
                <iconify-icon icon="heroicons:magnifying-glass" onclick="openSearch()"></iconify-icon>
            </div>
        </div>
    </header>

    <aside id="fsdocs-main-menu">
        <ul class="menu">
            {{fsdocs-list-of-namespaces}}
        </ul>
    </aside>

    <main>
        <article id="content">
            {{fsdocs-content}}
        </article>
    </main>

    <aside id="fsdocs-page-menu">
        <p id="on-this-page">On this page</p>
        {{fsdocs-list-of-entities}}
    </aside>

    {{fsdocs-tooltips}}
    <script type="text/javascript" src="{{root}}content/fsdocs-search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            renderMathInElement(document.body, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true }
                ],
                throwOnError: false
            });

            const mermaidBlocks = document.querySelectorAll('code.language-mermaid');

            mermaidBlocks.forEach((block, i) => {
                // 2. Extract the raw text
                const graphDefinition = block.innerText;
                const container = document.createElement('div');
                container.className = 'mermaid';
                container.innerHTML = graphDefinition;
                const pre = block.parentElement;
                pre.parentElement.replaceChild(container, pre);
            });

            mermaid.initialize({
                startOnLoad: true,
                theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'neutral'
            });
        });
    </script>

</body>

</html>
